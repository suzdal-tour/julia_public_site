<section class="wrapper style1 align-center">
    <div class="inner">
        <div class="index align-left">
            <section id="desc-{{ .index }}">

                <!-- Title -->
                <header>
                    <h2>{{ .title }}</h2>
                </header>
                <!-- Title -->


                <div class="content">

                    <!-- Description -->
                    {{ .description | safeHTML }}
                    <!-- Description -->


                    <!-- Prices -->
                    <div class="table-wrapper">
                        <table class="alt">
                            <thead>
                                <tr>
                                    <th>{{ i18n "ticket" }}</th>
                                    <th>{{ i18n "price" }}</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .price.per_person }}
                                <tr>
                                    <td>{{ .title }}</td>
                                    <td>{{ .value }}</td>
                                </tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </div>
                    <!-- Prices -->


                    <!-- Booking -->
                    <ul class="actions stacked">
                        <li>
                            <a href="#booking" class="button smooth-scroll-middle">{{ i18n "booking" }}</a>
                        </li>
                    </ul>
                    <!-- Booking -->

                </div>
            </section>
        </div>
    </div>
</section>
