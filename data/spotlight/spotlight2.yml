title : "Мастер-класс «Печём русский пряник»"
content: |
  Съесть вкусный пряник — это прекрасно, а вот узнать тонкости его изготовления, сделать своими руками и только потом насладиться им — ещё лучше! В уютном провинциальном домике я приглашаю вас на мастер-класс по пряничному искусству. Вы пройдёте все этапы — от подготовки теста до декорирования, узнаете интересные факты о пряниках и, в завершение, отведаете своё творение с чаем и вареньем. Это не просто кулинарный опыт, а настоящее погружение в мир сладкого искусства!
