####################### Banner #########################
style: "style1 orient-left content-align-justify image-position-right fullscreen onload-image-fade-in onload-content-fade-justify"
title : "Обо мне"
content : |
  Меня зовут Юлия, и уже половину своей жизни я наслаждаюсь волшебством старинного Суздаля. Родившись у самого синего моря на Дальнем Востоке, я была поражена уникальной атмосферой этого города, где застывшая русская красота переплетается с историей. С течением времени я углубилась в изучение обычаев и традиций Суздаля, и, следуя зову сердца, стала гидом. Вместе с туристами мы исследуем улочки, участвуем в квестах и отправляемся в пешие прогулки по церквушкам и монастырям. Несколько лет назад я придумала мастер-классы для гостей города, где мы мастерим обережные куклы, пекем ароматные крендели и создаем печатные пряники. Приглашаю вас открыть для себя мир творчества и традиций Суздаля!
