title : "Мастер-класс — изготовление русской тряпичной куклы"
content: |
  Тряпичная кукла — это не просто игрушка, а оберег и символ старорусского быта. Наши предки с закрытыми глазами могли создать маленького идола, который хранил тепло и защиту. На нашем мастер-классе вы освоите технику и секреты мастеров, что позволит вам почувствовать связь с поколениями и глубже понять культуру предков. А получившаяся куколка станет не только вашим творением, но и главным украшением вашего дома!
